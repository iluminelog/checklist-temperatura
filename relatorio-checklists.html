<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório · Check List de Temperatura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --primary:#00703C; --primary-dark:#015426; --primary-light:#1F8A4C;
    --gold:#F4B400; --gold-dark:#C99400;
    --bg:#F8F9FA; --surface:#FFFFFF; --surface-alt:#F1F5F2; --border:#E3E7E9;
    --text:#1B2422; --muted:#6B7680;
    --congelado:#0EA5E9; --resfriado:#5B6FD6; --seco:#B8862E;
    --ok:#16A34A; --alerta:#DC2626;
    --shadow-sm:0 1px 2px rgba(16,24,20,.05), 0 1px 3px rgba(16,24,20,.06);
    --shadow-md:0 4px 14px rgba(16,24,20,.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg);
    color:var(--text); font-family:'Inter',sans-serif; padding-bottom:90px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1220px;margin:0 auto;padding:0 24px;}

  header.top{
    background:var(--surface);
    padding:20px 0;display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:16px;border-bottom:1px solid var(--border);margin-bottom:24px;
  }
  header.top .title-group{display:flex;align-items:center;gap:14px;}
  header.top .logo-plaque{
    background:var(--primary-dark);border-radius:12px;padding:7px 11px;
    display:flex;align-items:center;flex-shrink:0;box-shadow:var(--shadow-sm);
  }
  header.top .logo-plaque img{height:32px;display:block;}
  header.top h1{font-family:'Inter';font-weight:700;font-size:22px;margin:0;color:var(--primary-dark);letter-spacing:-.01em;}
  header.top .sub{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-top:2px;font-weight:600;}

  .filters{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:14px 16px;box-shadow:var(--shadow-sm);
  }
  .filters select, .filters input{
    background:var(--surface-alt);border:1px solid var(--border);color:var(--text);
    border-radius:9px;padding:9px 12px;font-size:13.5px;font-family:'Inter';
    transition:border-color .15s, box-shadow .15s;
  }
  .filters select:focus, .filters input:focus{
    outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(0,112,60,.12);
  }
  .filters input[type="text"]{min-width:150px;}

  .btn{
    border:none;border-radius:10px;font-family:'Inter';font-weight:600;font-size:13.5px;
    cursor:pointer;transition:filter .15s, transform .05s;display:inline-flex;align-items:center;gap:8px;
  }
  .btn:active{transform:translateY(1px);}
  .btn-refresh{
    background:var(--primary);color:#fff;padding:10px 18px;box-shadow:var(--shadow-sm);
  }
  .btn-refresh:hover{filter:brightness(1.08);}

  .acoes-tabela{display:flex;justify-content:flex-end;margin-bottom:12px;}
  .btn-export{
    background:var(--gold);color:#3A2E00;padding:10px 18px;box-shadow:var(--shadow-sm);
  }
  .btn-export:hover{background:var(--gold-dark);color:#fff;}
  .btn-export svg{width:16px;height:16px;flex-shrink:0;}

  .tabela-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm);}
  .tabela-scroll{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  thead th{
    background:var(--surface-alt);color:var(--primary-dark);font-size:11px;text-transform:uppercase;
    letter-spacing:.05em;text-align:left;padding:12px 14px;font-weight:700;white-space:nowrap;
    border-bottom:1px solid var(--border);
  }
  tbody td{padding:11px 14px;font-size:13px;border-top:1px solid var(--border);white-space:nowrap;color:var(--text);}
  tbody tr.alerta td{color:var(--alerta);font-weight:500;}
  tbody tr:hover td{background:var(--surface-alt);}
  .status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;}
  .status-dot.ok{background:var(--ok);} .status-dot.alerta{background:var(--alerta);}
  .tipo-tag{font-family:'Inter';font-weight:700;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
  .tag-Congelado{background:rgba(14,165,233,.12);color:var(--congelado);}
  .tag-Resfriado{background:rgba(91,111,214,.12);color:var(--resfriado);}
  .tag-Seco{background:rgba(184,134,46,.14);color:var(--seco);}
  .ret-badge{font-size:10px;font-weight:600;color:var(--gold-dark);background:rgba(244,180,0,.14);border-radius:5px;padding:2px 7px;}

  .empty{color:var(--muted);font-size:13.5px;padding:32px;text-align:center;}

  .barra-acoes{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--surface);box-shadow:0 -4px 18px rgba(16,24,20,.08);
    border-top:1px solid var(--border);padding:14px 20px;
    display:flex;align-items:center;justify-content:center;gap:16px;
    transform:translateY(120%);transition:transform .2s;
  }
  .barra-acoes.show{transform:translateY(0);}
  .barra-acoes span{font-size:13.5px;color:var(--muted);}
  .barra-acoes span b{color:var(--text);}
  .btn-gerar-html{
    background:var(--primary);color:#fff;border:none;
    padding:11px 22px;box-shadow:var(--shadow-sm);
  }
  .btn-gerar-html:hover{filter:brightness(1.08);}
  .btn-gerar-html:disabled{opacity:.45;cursor:not-allowed;filter:none;}
  .btn-limpar-selecao{
    background:none;border:1px solid var(--border);color:var(--muted);padding:11px 16px;
  }
  .btn-limpar-selecao:hover{background:var(--surface-alt);color:var(--text);}

  @media (max-width: 720px){
    .wrap{padding:0 14px;}
    header.top{padding:16px 0;}
    .filters{padding:12px;}
    .acoes-tabela{justify-content:stretch;}
    .btn-export{width:100%;justify-content:center;}
    .barra-acoes{flex-wrap:wrap;gap:10px;padding:12px 14px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="title-group">
      <div class="logo-plaque"><img id="logoHeader" alt="Transzilli"></div>
      <div>
        <h1>Relatório de Check Lists</h1>
        <div class="sub">Câmaras Frias · Transzilli</div>
      </div>
    </div>
    <div class="filters">
      <select id="fUnidade"></select>
      <select id="fArmazem"></select>
      <select id="fCamara"></select>
      <select id="fTipo">
        <option value="">Todos os tipos</option>
        <option value="Congelado">Congelado</option>
        <option value="Resfriado">Resfriado</option>
        <option value="Seco">Seco</option>
      </select>
      <select id="fStatus">
        <option value="">Todos os status</option>
        <option value="OK">OK</option>
        <option value="ALERTA">Alerta</option>
      </select>
      <input type="date" id="fInicio">
      <input type="date" id="fFim">
      <input type="text" id="fId" placeholder="Buscar por ID">
      <button class="btn btn-refresh" id="btnAtualizar">Atualizar</button>
    </div>
  </header>

  <div class="acoes-tabela">
    <button class="btn btn-export" id="btnExportarXlsx">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="18" height="18" rx="2.5" stroke="currentColor" stroke-width="1.7"/>
        <path d="M3 9h18M3 15h18M9 3v18M15 3v18" stroke="currentColor" stroke-width="1.3" stroke-opacity=".55"/>
      </svg>
      Exportar para Excel
    </button>
  </div>

  <div class="tabela-wrap">
    <div class="tabela-scroll">
    <table id="tabelaRelatorio">
      <thead>
        <tr>
          <th><input type="checkbox" id="checkTodos"></th>
          <th>ID</th><th>Data/Hora</th><th>Unidade</th><th>Arm</th><th>Cam</th>
          <th>Tipo</th><th>Temp Padrão</th><th>Temp.</th><th>Status</th><th>Dispositivo</th><th></th>
        </tr>
      </thead>
      <tbody id="corpoTabela"></tbody>
    </table>
    </div>
  </div>
</div>

<div class="barra-acoes" id="barraAcoes">
  <span><b id="qtdSelecionados">0</b> selecionado(s)</span>
  <button class="btn-gerar-html" id="btnGerarHtml" disabled>Gerar Check List (Imprimir / PDF)</button>
  <button class="btn-limpar-selecao" id="btnLimparSelecao">Limpar seleção</button>
</div>

const REGRAS_TIPO = {
  'Congelado': '≤ -12°C',
  'Resfriado': '4°C a 8°C',
  'Seco':      '≤ 15°C'
};

let REGISTROS = [];
let selecionados = new Set(); // idRegistro + '|' + dispositivoPin, pra evitar ambiguidade

function chaveRegistro(r){ return r.idRegistro + '|' + r.dispositivoPin; }

async function carregarDados(){
  document.getElementById('corpoTabela').innerHTML = '<tr><td colspan="12" class="empty">Carregando...</td></tr>';
  try{
    const res = await fetch(APPS_SCRIPT_URL + '?action=dados');
    const data = await res.json();
    REGISTROS = (data.registros || []).map(r => ({ ...r, temperatura: Number(r.temperatura) }));
    popularFiltros();
    renderTabela();
  } catch(err){
    document.getElementById('corpoTabela').innerHTML = `<tr><td colspan="12" class="empty">Erro ao carregar: ${err.message}</td></tr>`;
  }
}

function popularFiltros(){
  const fu = document.getElementById('fUnidade');
  if (!fu.dataset.init){
    const unidades = [...new Set(REGISTROS.map(r => r.unidade))];
    fu.innerHTML = '<option value="">Todas unidades</option>' + unidades.map(u => `<option value="${u}">${u}</option>`).join('');
    fu.dataset.init = '1';
  }
  atualizarArmazens();
}
function atualizarArmazens(){
  const u = document.getElementById('fUnidade').value;
  const armazens = [...new Set(REGISTROS.filter(r => !u || r.unidade === u).map(r => r.armazem))];
  const fa = document.getElementById('fArmazem');
  const atual = fa.value;
  fa.innerHTML = '<option value="">Todos armazéns</option>' + armazens.map(a => `<option value="${a}">Armazém ${a}</option>`).join('');
  if (armazens.includes(atual)) fa.value = atual;
  atualizarCamaras();
}
function atualizarCamaras(){
  const u = document.getElementById('fUnidade').value;
  const a = document.getElementById('fArmazem').value;
  const camaras = [...new Set(REGISTROS.filter(r => (!u || r.unidade === u) && (!a || r.armazem === a)).map(r => r.camara))];
  const fc = document.getElementById('fCamara');
  const atual = fc.value;
  fc.innerHTML = '<option value="">Todas câmaras</option>' + camaras.map(c => `<option value="${c}">Câmara ${c}</option>`).join('');
  if (camaras.includes(atual)) fc.value = atual;
}

document.getElementById('fUnidade').addEventListener('change', () => { atualizarArmazens(); renderTabela(); });
document.getElementById('fArmazem').addEventListener('change', () => { atualizarCamaras(); renderTabela(); });
['fCamara','fTipo','fStatus','fInicio','fFim'].forEach(id => {
  document.getElementById(id).addEventListener('change', renderTabela);
});
document.getElementById('fId').addEventListener('input', renderTabela);
document.getElementById('btnAtualizar').addEventListener('click', carregarDados);

function registrosFiltrados(){
  const u = document.getElementById('fUnidade').value;
  const a = document.getElementById('fArmazem').value;
  const c = document.getElementById('fCamara').value;
  const tipo = document.getElementById('fTipo').value;
  const status = document.getElementById('fStatus').value;
  const idBusca = document.getElementById('fId').value.trim().toLowerCase();
  const ini = document.getElementById('fInicio').value ? new Date(document.getElementById('fInicio').value) : null;
  const fim = document.getElementById('fFim').value ? new Date(document.getElementById('fFim').value + 'T23:59:59') : null;

  return REGISTROS.filter(r => {
    const d = new Date(r.dataHora);
    if (u && r.unidade !== u) return false;
    if (a && r.armazem !== a) return false;
    if (c && r.camara !== c) return false;
    if (tipo && r.tipo !== tipo) return false;
    if (status && r.status !== status) return false;
    if (idBusca && !r.idRegistro.toLowerCase().includes(idBusca)) return false;
    if (ini && d < ini) return false;
    if (fim && d > fim) return false;
    return true;
  }).sort((x, y) => new Date(y.dataHora) - new Date(x.dataHora));
}

function renderTabela(){
  const regs = registrosFiltrados();
  const corpo = document.getElementById('corpoTabela');
  if (!regs.length){
    corpo.innerHTML = '<tr><td colspan="12" class="empty">Nenhum registro encontrado.</td></tr>';
    atualizarBarraAcoes();
    return;
  }
  corpo.innerHTML = regs.map(r => {
    const chave = chaveRegistro(r);
    return `
      <tr class="${r.status === 'ALERTA' ? 'alerta' : ''}">
        <td><input type="checkbox" class="check-linha" data-chave="${chave}" ${selecionados.has(chave) ? 'checked' : ''}></td>
        <td>${r.idRegistro}</td>
        <td>${new Date(r.dataHora).toLocaleString('pt-BR')}</td>
        <td>${r.unidade || '-'}</td>
        <td>${r.armazem}</td>
        <td>${r.camara}</td>
        <td><span class="tipo-tag tag-${r.tipo}">${r.tipo}</span></td>
        <td>${REGRAS_TIPO[r.tipo] || '—'}</td>
        <td>${r.temperatura}°C</td>
        <td><span class="status-dot ${r.status === 'ALERTA' ? 'alerta' : 'ok'}"></span>${r.status}</td>
        <td>${r.dispositivoNome || '-'}</td>
        <td>${r.idRetificacaoDe ? '<span class="ret-badge">retificação</span>' : ''}</td>
      </tr>`;
  }).join('');

  corpo.querySelectorAll('.check-linha').forEach(chk => {
    chk.addEventListener('change', () => {
      if (chk.checked) selecionados.add(chk.dataset.chave);
      else selecionados.delete(chk.dataset.chave);
      atualizarBarraAcoes();
      atualizarCheckTodos();
    });
  });
  atualizarCheckTodos();
  atualizarBarraAcoes();
}

function atualizarCheckTodos(){
  const linhas = [...document.querySelectorAll('.check-linha')];
  const checkTodos = document.getElementById('checkTodos');
  if (!linhas.length){ checkTodos.checked = false; checkTodos.indeterminate = false; return; }
  const marcados = linhas.filter(l => l.checked).length;
  checkTodos.checked = marcados === linhas.length;
  checkTodos.indeterminate = marcados > 0 && marcados < linhas.length;
}

document.getElementById('checkTodos').addEventListener('change', (e) => {
  document.querySelectorAll('.check-linha').forEach(chk => {
    chk.checked = e.target.checked;
    if (e.target.checked) selecionados.add(chk.dataset.chave);
    else selecionados.delete(chk.dataset.chave);
  });
  atualizarBarraAcoes();
});

function atualizarBarraAcoes(){
  const qtd = selecionados.size;
  document.getElementById('qtdSelecionados').textContent = qtd;
  document.getElementById('barraAcoes').classList.toggle('show', qtd > 0);
  document.getElementById('btnGerarHtml').disabled = qtd === 0;
}

document.getElementById('btnLimparSelecao').addEventListener('click', () => {
  selecionados.clear();
  renderTabela();
});

/* ---------- Exportar para Excel (XLSX) ---------- */
function exportarXlsx(){
  const regs = registrosFiltrados();
  if (!regs.length){
    alert('Não há registros para exportar com os filtros atuais.');
    return;
  }

  const linhas = regs.map(r => ({
    'ID': r.idRegistro,
    'Data/Hora': new Date(r.dataHora).toLocaleString('pt-BR'),
    'Unidade': r.unidade || '-',
    'Armazém': r.armazem,
    'Câmara': r.camara,
    'Tipo': r.tipo,
    'Temp Padrão': REGRAS_TIPO[r.tipo] || '-',
    'Temperatura (°C)': r.temperatura,
    'Status': r.status,
    'Dispositivo': r.dispositivoNome || '-',
    'Retificação': r.idRetificacaoDe ? 'Sim' : 'Não'
  }));

  const ws = XLSX.utils.json_to_sheet(linhas);
  ws['!cols'] = [
    { wch: 14 }, { wch: 20 }, { wch: 28 }, { wch: 8 }, { wch: 8 },
    { wch: 12 }, { wch: 14 }, { wch: 16 }, { wch: 10 }, { wch: 22 }, { wch: 12 }
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Check Lists');

  const nomeArquivo = `relatorio_checklists_transzilli_${dataLocalYyyyMmDd(new Date())}.xlsx`;
  XLSX.writeFile(wb, nomeArquivo);
}
document.getElementById('btnExportarXlsx').addEventListener('click', exportarXlsx);

/* ---------- Fotos e geração de PDF ---------- */
function extrairFileId(url){
  const m = String(url).match(/\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}
async function carregarFotoBase64(url){
  const fileId = extrairFileId(url);
  if (!fileId) return null;
  try{
    const res = await fetch(APPS_SCRIPT_URL + '?action=foto&id=' + encodeURIComponent(fileId));
    const data = await res.json();
    if (!data.ok) return null;
    return `data:${data.mimeType};base64,${data.base64}`;
  } catch(e){ return null; }
}

/* ---------- Exportar para impressão em HTML (A4 retrato) - alternativa mais leve ao PDF ---------- */
function montarPaginaImpressao(registro, fotosDataUrl){
  const agora = new Date(registro.dataHora);
  const linhas = [
    ['ID do Registro', registro.idRegistro],
    ['Data/Hora', agora.toLocaleString('pt-BR')],
    ['Unidade', registro.unidade || '-'],
    ['Armazém', String(registro.armazem)],
    ['Câmara', String(registro.camara)],
    ['Tipo', registro.tipo],
    ['Temp Padrão', REGRAS_TIPO[registro.tipo] || '-'],
    ['Temperatura', registro.temperatura + '°C'],
    ['Status', registro.status === 'OK' ? 'Dentro da faixa' : 'Fora da faixa (ALERTA)'],
    ['Dispositivo', registro.dispositivoNome || '-']
  ];
  if (registro.idRetificacaoDe){
    linhas.push(['Retificação do registro', registro.idRetificacaoDe.split('|')[0]]);
  }

  const linhasHtml = linhas.map(([label, valor]) => `
    <div class="campo"><span class="rotulo">${label}</span><span class="valor">${valor}</span></div>
  `).join('');

  const fotosHtml = (fotosDataUrl && fotosDataUrl.length)
    ? `<div class="secao-fotos">
         <h3>Fotos do painel / termômetro</h3>
         <div class="grade-fotos">${fotosDataUrl.map(du => `<img src="${du}">`).join('')}</div>
       </div>`
    : '';

  return `
    <section class="pagina">
      <header class="cabecalho-impressao">
        <img class="logo-impressao" src="${LOGO_TRANSZILLI_BASE64}" alt="Transzilli">
        <div>
          <h1>Check List de Temperatura</h1>
          <div class="subtitulo">Câmaras Frias · Transzilli</div>
        </div>
      </header>
      <div class="campos">${linhasHtml}</div>
      ${fotosHtml}
    </section>`;
}

async function gerarImpressaoHtml(){
  const btn = document.getElementById('btnGerarHtml');
  btn.disabled = true; btn.textContent = 'Preparando...';

  const chaves = [...selecionados];
  const escolhidos = REGISTROS.filter(r => chaves.includes(chaveRegistro(r)))
    .sort((a, b) => new Date(a.dataHora) - new Date(b.dataHora));

  const paginasHtml = [];
  for (let i = 0; i < escolhidos.length; i++){
    const registro = escolhidos[i];
    btn.textContent = `Preparando... (${i + 1}/${escolhidos.length})`;
    let fotosDataUrl = [];
    if (registro.fotos && registro.fotos.length){
      fotosDataUrl = (await Promise.all(registro.fotos.map(carregarFotoBase64))).filter(Boolean);
    }
    paginasHtml.push(montarPaginaImpressao(registro, fotosDataUrl));
  }

  const documentoHtml = `

<html lang="pt-BR">
<head>

<style>

  const janela = window.open('', '_blank');
  if (!janela){

  } else {

function dataLocalYyyyMmDd(d){
  const ano = d.getFullYear();
  const mes = String(d.getMonth() + 1).padStart(2, '0');
  const dia = String(d.getDate()).padStart(2, '0');
  return `${ano}-${mes}-${dia}`;
}
